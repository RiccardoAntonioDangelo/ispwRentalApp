name: SonarQube
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build:
    name: Build and analyze
    # Cambiato da ubuntu-latest a windows-latest per usare macchine Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Disabilita lo shallow clone richiesto da SonarQube

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25' # Impostato su Java 25 (puoi mettere '21' se preferisci l'SDK 21)
          distribution: 'zulu'

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # Su Windows, GitHub Actions usa PowerShell di default.
        # Il comando Maven rimane lo stesso ma viene eseguito nell'ambiente Windows.
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=RiccardoAntonioDangelo_ispwRentalApp